{% extends "transporte/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center">
                <h4 class="text-danger mb-4">Confirmar Eliminación</h4>
                <p>¿Estás seguro de que deseas eliminar la ruta <strong>{{ object.origen }} a {{ object.destino }}</strong>?</p>
                <p class="text-muted small">Esta acción no se puede deshacer y eliminará los viajes asociados.</p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn" style="background-color: var(--accent);">Sí, Eliminar</button>
                    <a href="{% url 'lista_rutas' %}" class="btn" style="background-color: var(--text-dim);">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
